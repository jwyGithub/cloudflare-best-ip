services:
    cloudflare-best-ip:
        image: ghcr.io/jwygithub/cloudflare-best-ip:latest
        container_name: cloudflare-best-ip
        restart: unless-stopped
        volumes:
            - ./config.yaml:/app/config.yaml:ro
            - ./output:/app/output
        environment:
            TZ: Asia/Shanghai
            # 可选：启用 sync.github 时用于 GitHub API 同步。
            # 建议在 .env 中设置 GITHUB_TOKEN，避免明文提交。
            GITHUB_TOKEN: ${GITHUB_TOKEN:-}
        logging:
            driver: json-file
            options:
                max-size: '10m'
                max-file: '3'
