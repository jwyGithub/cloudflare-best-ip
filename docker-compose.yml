services:
    cloudflare-best-ip:
        image: ghcr.io/jwygithub/cloudflare-best-ip:latest
        container_name: cloudflare-best-ip
        restart: unless-stopped
        volumes:
            - ./output:/app/output
        environment:
            TZ: Asia/Shanghai
            # 可选：指定内置 IP 源；留空时使用默认配置中的 cloudflare。
            SCAN_SOURCE: ${SCAN_SOURCE:-}
            # 可选：指定固定端口；留空时从内置端口池随机选择。
            SCAN_PORT: ${SCAN_PORT:-}
            # 可选：扫描数量。默认 512
            SCAN_TOTAL: ${SCAN_TOTAL:-}
            # 可选：输出文件路径。默认 result.txt
            SCAN_OUTPUT_PATH: ${SCAN_OUTPUT_PATH:-}
            # 可选：输出文件最大行数。默认 100
            SCAN_OUTPUT_LIMIT: ${SCAN_OUTPUT_LIMIT:-}
            # 可选：cron 表达式。 默认 0 0 * * *
            SCHEDULE_CRON: ${SCHEDULE_CRON:-}
            # 可选：时区。 默认 Asia/Shanghai
            SCHEDULE_TIMEZONE: ${SCHEDULE_TIMEZONE:-}
            # 可选：日志等级。 默认 INFO
            LOG_LEVEL: ${LOG_LEVEL:-}
            # 可选：配置 GitHub 同步；token 与仓库信息齐全时自动启用
            SYNC_GITHUB_OWNER: ${SYNC_GITHUB_OWNER:-}
            SYNC_GITHUB_REPO: ${SYNC_GITHUB_REPO:-}
            SYNC_GITHUB_BRANCH: ${SYNC_GITHUB_BRANCH:-}
            SYNC_GITHUB_REMOTE_PATH: ${SYNC_GITHUB_REMOTE_PATH:-}
            SYNC_GITHUB_TOKEN: ${SYNC_GITHUB_TOKEN:-}
        logging:
            driver: json-file
            options:
                max-size: '10m'
                max-file: '3'
