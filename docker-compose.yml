services:
    cloudflare-best-ip:
        image: ghcr.io/jwygithub/cloudflare-best-ip:latest
        container_name: cloudflare-best-ip
        restart: unless-stopped
        volumes:
            - ./config.yaml:/app/config.yaml:ro
            - ./output:/app/output
        environment:
            TZ: Asia/Shanghai
        logging:
            driver: json-file
            options:
                max-size: '10m'
                max-file: '3'

