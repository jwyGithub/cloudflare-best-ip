name: docker release

on:
    push:
        tags:
            - 'v*.*.*'
    workflow_dispatch:
        inputs:
            tag:
                description: Manual tag to publish (e.g. v0.1.0)
                required: false
                default: ''

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Resolve release version
              id: resolve
              shell: bash
              run: |
                  INPUT="${{ inputs.tag }}"
                  if [ -n "$INPUT" ]; then
                      # workflow_dispatch with manual input
                      RAW="$INPUT"
                      [[ "$RAW" != v* ]] && RAW="v$RAW"
                  elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
                      # tag push event
                      RAW="${GITHUB_REF#refs/tags/}"
                  else
                      echo "::error::This workflow must be triggered by a tag push (v*.*.*) or with a manual 'tag' input"
                      exit 1
                  fi
                  echo "version=$RAW" >> "$GITHUB_OUTPUT"
                  echo "Resolved version: $RAW"

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=semver,pattern={{version}},value=${{ steps.resolve.outputs.version }}
                      type=semver,pattern={{major}}.{{minor}},value=${{ steps.resolve.outputs.version }}
                      type=semver,pattern={{major}},value=${{ steps.resolve.outputs.version }}
                      type=raw,value=latest
                  labels: |
                      org.opencontainers.image.title=cloudflare-best-ip
                      org.opencontainers.image.description=Cloudflare IP 优选工具
                      org.opencontainers.image.source=https://github.com/${{ github.repository }}
                      org.opencontainers.image.licenses=MIT
                      org.opencontainers.image.version=${{ steps.resolve.outputs.version }}

            - name: Build and push image
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  provenance: false

            - name: Image summary
              run: |
                  echo "### Published Docker image" >> "$GITHUB_STEP_SUMMARY"
                  echo '```' >> "$GITHUB_STEP_SUMMARY"
                  echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
                  echo '```' >> "$GITHUB_STEP_SUMMARY"
